<title>Policy Entanglement in Active Inference — A Visual Tour</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #3b82f6;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #1b2230, var(--panel));
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 { margin: 0; font-size: 22px; }
  header .sub { color: var(--muted); font-size: 14px; }
  .layout { display: flex; flex: 1; min-height: 0; }
  .sidebar {
    width: 300px;
    border-right: 1px solid var(--border);
    background: var(--panel);
    padding: 12px 0;
    overflow-y: auto;
  }
  .sidebar h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 0 16px;
    margin: 8px 0;
  }
  .chapter {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--text);
    padding: 10px 16px;
    cursor: pointer;
    font-size: 14px;
  }
  .chapter:hover { background: rgba(59,130,246,0.12); }
  .chapter.active {
    background: rgba(59,130,246,0.20);
    border-left: 3px solid var(--accent);
  }
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 20px;
  }
  .frame {
    max-width: 100%;
    max-height: 64vh;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    background: #0a0d12;
  }
  .caption {
    font-size: 24px;
    line-height: 1.5;
    text-align: center;
    max-width: 880px;
    min-height: 2em;
    color: #f3f6fa;
  }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .controls button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  .controls button:hover { filter: brightness(1.1); }
  .clock { color: var(--muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<header><h1>Policy Entanglement in Active Inference — A Visual Tour</h1><span class="sub">DemoCreate interactive player · 16 chapters</span></header>
<div class="layout">

      <button id="prev">&#9664; Prev</button>

      <button id="next">Next &#9654;</button>
      <span id="clock" class="clock">0.0s</span>
    </div>
  </main>
</div>
<script>
const CAPTIONS = [{"chunk_id": "hero-c", "scene_id": "hero", "text": "Many decision streams, one body — two hands, two eyes, a teammate, a long horizon. How do they stay coordinated?", "start_ms": 300, "frame": "frame_0000.png"}, {"chunk_id": "problem-c", "scene_id": "problem", "text": "Standard active inference assumes the streams are independent. Cheap to compute — but independence cannot coordinate.", "start_ms": 8743, "frame": "frame_0001.png"}, {"chunk_id": "idea-c", "scene_id": "idea", "text": "One scalar coupling, lambda, deforms the independent posterior, with explicit compatibility and preference potentials. At zero, ordinary active inference; turn it up, and the streams entangle.", "start_ms": 15790, "frame": "frame_0002.png"}, {"chunk_id": "glance-c", "scene_id": "glance", "text": "A claim-strength ledger keeps it honest: exact recoveries, parameterized embeddings, numerical witnesses, and structural analogies never blur together. The central identity is machine-checked in Lean.", "start_ms": 29050, "frame": "frame_0003.png"}, {"chunk_id": "sweep-c", "scene_id": "sweep", "text": "Lambda from zero to four: the joint goes from a product of independent marginals to mass locked on the aligned diagonal.", "start_ms": 42102, "frame": "frame_0004.png"}, {"chunk_id": "fig-joint-c", "scene_id": "fig-joint", "text": "Each stream alone — the side bars — barely moves. The coordination lives only in the joint, and the free-energy ledger names its exact price: the multi-information of leaving independence.", "start_ms": 48989, "frame": "frame_0005.png"}, {"chunk_id": "fig-mi-c", "scene_id": "fig-mi", "text": "Machine precision, not hand-waving. Closed-form mutual information against a brute-force sampler — the residual sits below ten to the minus fifteen. The central identity is proven in Lean; everything else is witnessed numerically, like this.", "start_ms": 60872, "frame": "frame_0006.png"}, {"chunk_id": "fig-lambdastar-c", "scene_id": "fig-lambdastar", "text": "Any target alignment has a closed-form coupling — lambda-star equals two arctanh of delta over delta-max. Solve it; don't search.", "start_ms": 76536, "frame": "frame_0007.png"}, {"chunk_id": "fig-tax-c", "scene_id": "fig-tax", "text": "Entanglement costs information. Coupling pays only above the line, where utility clears the multi-information tax. Below it, stay independent.", "start_ms": 85271, "frame": "frame_0008.png"}, {"chunk_id": "fig-geodesic-c", "scene_id": "fig-geodesic", "text": "Every log-weight runs dead-straight in lambda, to floating-point precision — an exponential geodesic away from the mean-field submanifold, with a projection identity that snaps the coupled posterior back to its independent marginals.", "start_ms": 94875, "frame": "frame_0009.png"}, {"chunk_id": "fig-archetypes-c", "scene_id": "fig-archetypes", "text": "More coupling concentrates the mass, it does not spread it. A handful of Schmidt archetypes carry almost all the probability.", "start_ms": 109042, "frame": "frame_0010.png"}, {"chunk_id": "fig-scale-c", "scene_id": "fig-scale", "text": "Five streams, not two: the bond dimension stays at most three. Borrowed from tensor networks, coordination represents cheaply at any K.", "start_ms": 116486, "frame": "frame_0011.png"}, {"chunk_id": "fig-phase-c", "scene_id": "fig-phase", "text": "The optimal coupling across payoff and competition — a phase diagram for when to act as one, and when to stay apart.", "start_ms": 126398, "frame": "frame_0012.png"}, {"chunk_id": "fig-pymdp-c", "scene_id": "fig-pymdp", "text": "The same coupling, dropped into a pymdp POMDP agent: coordinated rollouts in a live planning loop, not just equations on a page.", "start_ms": 133768, "frame": "frame_0013.png"}, {"chunk_id": "codebase-c", "scene_id": "codebase", "text": "Every figure is reproducible — emitted by the paper's own code, which implements the theory and checks each claim.", "start_ms": 142754, "frame": "frame_0014.png"}, {"chunk_id": "outro-c", "scene_id": "outro", "text": "Policy entanglement makes coordination tunable, measurable, and compressible — linking active inference to products of experts, copula variational inference, branching-time active inference, and tensor-network compression. One knob; coordinated action becomes a choice.", "start_ms": 149618, "frame": "frame_0015.png"}];
const CHAPTERS = [{"title": "Policy Entanglement", "scene_id": "hero", "start_ms": 300}, {"title": "The convenient lie of independence", "scene_id": "problem", "start_ms": 8743}, {"title": "One knob: policy entanglement", "scene_id": "idea", "start_ms": 15790}, {"title": "The paper at a glance", "scene_id": "glance", "start_ms": 29050}, {"title": "Turn the knob", "scene_id": "sweep", "start_ms": 42102}, {"title": "Hidden in the Joint", "scene_id": "fig-joint", "start_ms": 48989}, {"title": "Proven, Then Witnessed", "scene_id": "fig-mi", "start_ms": 60872}, {"title": "Coordination on Demand", "scene_id": "fig-lambdastar", "start_ms": 76536}, {"title": "Coordination Has a Price", "scene_id": "fig-tax", "start_ms": 85271}, {"title": "A Principled Path", "scene_id": "fig-geodesic", "start_ms": 94875}, {"title": "It Collapses to a Few Modes", "scene_id": "fig-archetypes", "start_ms": 109042}, {"title": "And It Scales", "scene_id": "fig-scale", "start_ms": 116486}, {"title": "When to Act as One", "scene_id": "fig-phase", "start_ms": 126398}, {"title": "Not Just Theory", "scene_id": "fig-pymdp", "start_ms": 133768}, {"title": "The Paper's Codebase", "scene_id": "codebase", "start_ms": 142754}, {"title": "Coordination, as a dial", "scene_id": "outro", "start_ms": 149618}];
const FRAMES_DIR = "../frames";
const TOTAL_MS = 162418;

let timeMs = 0;
let playing = false;
let timer = null;
const STEP_MS = 100;

const captionEl = document.getElementById("caption");
const clockEl = document.getElementById("clock");
const playBtn = document.getElementById("play");
const frameEl = document.getElementById("frame");
const chapterBtns = Array.from(document.querySelectorAll(".chapter"));

function currentCueIndex(t) {
  let idx = 0;
  for (let i = 0; i < CAPTIONS.length; i++) {
    if (CAPTIONS[i].start_ms <= t) idx = i;
  }
  return CAPTIONS.length ? idx : -1;
}

function render() {
  const idx = currentCueIndex(timeMs);
  if (idx >= 0) {
    const cue = CAPTIONS[idx];
    captionEl.textContent = cue.text;
    if (frameEl && FRAMES_DIR && cue.frame) {
      frameEl.src = FRAMES_DIR + "/" + cue.frame;
    }
    chapterBtns.forEach((b) => b.classList.remove("active"));
    const active = chapterBtns.filter((b) => Number(b.dataset.start) <= timeMs).pop();
    if (active) active.classList.add("active");
  }
  clockEl.textContent = (timeMs / 1000).toFixed(1) + "s";
}

function seek(ms) {
  timeMs = Math.max(0, Math.min(ms, TOTAL_MS));
  render();
}

function step(dir) {
  const idx = currentCueIndex(timeMs);
  const next = Math.max(0, Math.min(idx + dir, CAPTIONS.length - 1));
  if (CAPTIONS[next]) seek(CAPTIONS[next].start_ms);
}

function tick() {
  timeMs += STEP_MS;
  if (timeMs >= TOTAL_MS) {
    timeMs = TOTAL_MS;
    pause();
  }
  render();
}

function play() {
  if (playing) return;
  playing = true;
  playBtn.textContent = "Pause";
  timer = setInterval(tick, STEP_MS);
}

function pause() {
  playing = false;
  playBtn.textContent = "Play";
  if (timer) clearInterval(timer);
  timer = null;
}

playBtn.addEventListener("click", () => (playing ? pause() : play()));
document.getElementById("prev").addEventListener("click", () => step(-1));
document.getElementById("next").addEventListener("click", () => step(1));
chapterBtns.forEach((b) =>
  b.addEventListener("click", () => seek(Number(b.dataset.start)))
);

render();
</script>
</body>
</html>
