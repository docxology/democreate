<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DemoCreate — The Showcase</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #3b82f6;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #1b2230, var(--panel));
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 { margin: 0; font-size: 22px; }
  header .sub { color: var(--muted); font-size: 14px; }
  .layout { display: flex; flex: 1; min-height: 0; }
  .sidebar {
    width: 300px;
    border-right: 1px solid var(--border);
    background: var(--panel);
    padding: 12px 0;
    overflow-y: auto;
  }
  .sidebar h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 0 16px;
    margin: 8px 0;
  }
  .chapter {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--text);
    padding: 10px 16px;
    cursor: pointer;
    font-size: 14px;
  }
  .chapter:hover { background: rgba(59,130,246,0.12); }
  .chapter.active {
    background: rgba(59,130,246,0.20);
    border-left: 3px solid var(--accent);
  }
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 20px;
  }
  .frame {
    max-width: 100%;
    max-height: 64vh;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    background: #0a0d12;
  }
  .caption {
    font-size: 24px;
    line-height: 1.5;
    text-align: center;
    max-width: 880px;
    min-height: 2em;
    color: #f3f6fa;
  }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .controls button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  .controls button:hover { filter: brightness(1.1); }
  .clock { color: var(--muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<header><h1>DemoCreate — The Showcase</h1><span class="sub">DemoCreate interactive player · 14 chapters</span></header>
<div class="layout">
  <nav class="sidebar">
    <h2>Chapters</h2>
    
    <button class="chapter" data-start="300" data-scene="title">DemoCreate</button>
    
    <button class="chapter" data-start="6420" data-scene="abstract">The whole idea</button>
    
    <button class="chapter" data-start="17927" data-scene="what">A demo is a value, not a recording</button>
    
    <button class="chapter" data-start="26317" data-scene="spine">src/democreate/schema.py</button>
    
    <button class="chapter" data-start="33852" data-scene="backends">src/democreate/narration/tts.py</button>
    
    <button class="chapter" data-start="45121" data-scene="sync">src/democreate/narration/sync.py</button>
    
    <button class="chapter" data-start="56010" data-scene="craft">What you are seeing, right now</button>
    
    <button class="chapter" data-start="62612" data-scene="themes">Fully configurable</button>
    
    <button class="chapter" data-start="72424" data-scene="paper">Papers, not just packages</button>
    
    <button class="chapter" data-start="83953" data-scene="arch">Seven subsystems, one spine</button>
    
    <button class="chapter" data-start="93561" data-scene="numbers">DemoCreate by the numbers</button>
    
    <button class="chapter" data-start="102682" data-scene="provenance">Signed, tamper-evident provenance</button>
    
    <button class="chapter" data-start="109795" data-scene="render">terminal</button>
    
    <button class="chapter" data-start="118001" data-scene="outro">DemoCreate</button>
    
  </nav>
  <main class="stage">
    
    <img id="frame" class="frame" alt="current frame" />
    
    <div id="caption" class="caption"></div>
    <div class="controls">
      <button id="prev">&#9664; Prev</button>
      <button id="play">Play</button>
      <button id="next">Next &#9654;</button>
      <span id="clock" class="clock">0.0s</span>
    </div>
  </main>
</div>
<script>
const CAPTIONS = [{"chunk_id": "title-c", "scene_id": "title", "text": "What if a demo video was not a recording you capture, but a value you compile? This is DemoCreate.", "start_ms": 300, "frame": "frame_0000.png"}, {"chunk_id": "abstract-c", "scene_id": "abstract", "text": "One declarative artifact — describing a codebase or a research paper — compiles through a deterministic pipeline into a verified, provenance-signed video. Here is the whole idea on one screen.", "start_ms": 6420, "frame": "frame_0001.png"}, {"chunk_id": "what-c", "scene_id": "what", "text": "A demo is a declarative spine: scenes of narration chunks, each an ordered stream of typed actions. Three ideas carry the whole system.", "start_ms": 17927, "frame": "frame_0002.png"}, {"chunk_id": "spine-c", "scene_id": "spine", "text": "The spine is plain data. A demo is scenes; a scene is chunks; a chunk is typed actions. Rendering never mutates it.", "start_ms": 26317, "frame": "frame_0003.png"}, {"chunk_id": "backends-c", "scene_id": "backends", "text": "Every capability hides behind an interface with a deterministic default. Silent gives you zero dependencies; the system voice is a real OS binary; neural backends are an optional upgrade.", "start_ms": 33852, "frame": "frame_0004.png"}, {"chunk_id": "sync-c", "scene_id": "sync", "text": "Timing is measured, never guessed. We synthesize the narration, measure its real duration, transcribe it back to word timestamps, and anchor each action to the word it is spoken on.", "start_ms": 45121, "frame": "frame_0005.png"}, {"chunk_id": "craft-c", "scene_id": "craft", "text": "Everything you are watching is generated from that spine. The code you just saw typed itself in. Look at this frame.", "start_ms": 56010, "frame": "frame_0006.png"}, {"chunk_id": "themes-c", "scene_id": "themes", "text": "One commented YAML controls the whole look and sound — five built-in themes, any aspect ratio, resolution up to four K, and near-lossless quality.", "start_ms": 62612, "frame": "frame_0007.png"}, {"chunk_id": "paper-c", "scene_id": "paper", "text": "The same engine demos a research paper: it reads the PDF with no Python dependency, recovers the real abstract, the real figure captions, and the sections — and shows each figure whole.", "start_ms": 72424, "frame": "frame_0008.png"}, {"chunk_id": "arch-c", "scene_id": "arch", "text": "Under the hood, seven subsystems compose: the spine flows into narration, then rendering, then export — every stage a pure function of the one artifact.", "start_ms": 83953, "frame": "frame_0009.png"}, {"chunk_id": "numbers-c", "scene_id": "numbers", "text": "And it is real. Nearly six hundred tests, seven subsystems, five themes, four K output — and zero pip dependencies for the core.", "start_ms": 93561, "frame": "frame_0010.png"}, {"chunk_id": "provenance-c", "scene_id": "provenance", "text": "Every render carries its own provenance, three ways — so a video can prove where it came from, and resist tampering.", "start_ms": 102682, "frame": "frame_0011.png"}, {"chunk_id": "render-c", "scene_id": "render", "text": "Then one command renders a high-definition video with a real voiceover, and proves it is genuine — real streams, not silent, not black.", "start_ms": 109795, "frame": "frame_0012.png"}, {"chunk_id": "outro-c", "scene_id": "outro", "text": "Declarative. Deterministic. Dogfooded. This entire video was compiled by DemoCreate from one file. Edit it, re-render, and never record a take again.", "start_ms": 118001, "frame": "frame_0013.png"}];
const CHAPTERS = [{"title": "DemoCreate", "scene_id": "title", "start_ms": 300}, {"title": "The whole idea", "scene_id": "abstract", "start_ms": 6420}, {"title": "A demo is a value, not a recording", "scene_id": "what", "start_ms": 17927}, {"title": "src/democreate/schema.py", "scene_id": "spine", "start_ms": 26317}, {"title": "src/democreate/narration/tts.py", "scene_id": "backends", "start_ms": 33852}, {"title": "src/democreate/narration/sync.py", "scene_id": "sync", "start_ms": 45121}, {"title": "What you are seeing, right now", "scene_id": "craft", "start_ms": 56010}, {"title": "Fully configurable", "scene_id": "themes", "start_ms": 62612}, {"title": "Papers, not just packages", "scene_id": "paper", "start_ms": 72424}, {"title": "Seven subsystems, one spine", "scene_id": "arch", "start_ms": 83953}, {"title": "DemoCreate by the numbers", "scene_id": "numbers", "start_ms": 93561}, {"title": "Signed, tamper-evident provenance", "scene_id": "provenance", "start_ms": 102682}, {"title": "terminal", "scene_id": "render", "start_ms": 109795}, {"title": "DemoCreate", "scene_id": "outro", "start_ms": 118001}];
const FRAMES_DIR = "../frames";
const TOTAL_MS = 126801;

let timeMs = 0;
let playing = false;
let timer = null;
const STEP_MS = 100;

const captionEl = document.getElementById("caption");
const clockEl = document.getElementById("clock");
const playBtn = document.getElementById("play");
const frameEl = document.getElementById("frame");
const chapterBtns = Array.from(document.querySelectorAll(".chapter"));

function currentCueIndex(t) {
  let idx = 0;
  for (let i = 0; i < CAPTIONS.length; i++) {
    if (CAPTIONS[i].start_ms <= t) idx = i;
  }
  return CAPTIONS.length ? idx : -1;
}

function render() {
  const idx = currentCueIndex(timeMs);
  if (idx >= 0) {
    const cue = CAPTIONS[idx];
    captionEl.textContent = cue.text;
    if (frameEl && FRAMES_DIR && cue.frame) {
      frameEl.src = FRAMES_DIR + "/" + cue.frame;
    }
    chapterBtns.forEach((b) => b.classList.remove("active"));
    const active = chapterBtns.filter((b) => Number(b.dataset.start) <= timeMs).pop();
    if (active) active.classList.add("active");
  }
  clockEl.textContent = (timeMs / 1000).toFixed(1) + "s";
}

function seek(ms) {
  timeMs = Math.max(0, Math.min(ms, TOTAL_MS));
  render();
}

function step(dir) {
  const idx = currentCueIndex(timeMs);
  const next = Math.max(0, Math.min(idx + dir, CAPTIONS.length - 1));
  if (CAPTIONS[next]) seek(CAPTIONS[next].start_ms);
}

function tick() {
  timeMs += STEP_MS;
  if (timeMs >= TOTAL_MS) {
    timeMs = TOTAL_MS;
    pause();
  }
  render();
}

function play() {
  if (playing) return;
  playing = true;
  playBtn.textContent = "Pause";
  timer = setInterval(tick, STEP_MS);
}

function pause() {
  playing = false;
  playBtn.textContent = "Play";
  if (timer) clearInterval(timer);
  timer = null;
}

playBtn.addEventListener("click", () => (playing ? pause() : play()));
document.getElementById("prev").addEventListener("click", () => step(-1));
document.getElementById("next").addEventListener("click", () => step(1));
chapterBtns.forEach((b) =>
  b.addEventListener("click", () => seek(Number(b.dataset.start)))
);

render();
</script>
</body>
</html>
